# JxMVC — Demo site configuration
jxmvc.controllers.package = jxmvc.controllers
jxmvc.services.package    = jxmvc.services
jxmvc.profiles.active     = prod
jxmvc.log.level           = INFO
jxmvc.async.threads       = 8

# Pool deshabilitado — demo site sin BD
jxmvc.pool.enabled        = false

jxmvc.security.frame-options = SAMEORIGIN
jxmvc.security.hsts          = true

# Confiar en X-Forwarded-For solo si hay un reverse proxy de confianza delante
jxmvc.trustProxy             = false

# Endpoints de demostración con BD (solo perfil dev). Configurar por entorno:
#   DB de demo:  JXMVC_DEMO_DB_URL / JXMVC_DEMO_DB_USER / JXMVC_DEMO_DB_PASS
# jxmvc.demo.db.url  = jdbc:postgresql://host:5432/db
# jxmvc.demo.db.user =
# jxmvc.demo.db.pass =
